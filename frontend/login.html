<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Orbit - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold">🚀 Astro Orbit</h2>
            <p class="text-muted">Software Engineering Project Authentication</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold">Select Your Role (UserRole)</label>
                <select class="form-select" id="userRole" required>
                    <option value="TRAVELER">Leisure Traveler / Digital Nomad</option>
                    <option value="HOST">Property Owner / Host</option>
                    <option value="ADMIN">System Administrator</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 btn-lg">Sign In</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const role = document.getElementById('userRole').value;
            alert(`Authentication Successful!\nisAuthenticated() = true\nRole: ${role}\nRedirecting to Dashboard...`);
            window.location.href = "index.html"; 
        });
    </script>
</body>
</html>
